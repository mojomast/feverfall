name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Replay hash gate
        run: cargo run -p replay_runner
      - name: Vertical slice replay gate
        run: cargo run -p replay_runner -- --replay tests/golden_replays/vertical_slice_feel_fan.replay.json
      - name: Act 1 two-board smoke replay gate
        run: cargo run -p replay_runner -- --replay tests/golden_replays/act1_twobboard_run.replay.json
      - name: Board validation
        run: cargo run -p board_validator
      - name: Content lint
        run: cargo run -p content_linter
      - name: Seed browser smoke
        run: cargo run -p seed_browser -- --act 1 --archetype fan --count 3
      - name: Game smoke test
        run: cargo run -p feverfall_game

name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Replay hash gate
        run: cargo run -p replay_runner
      - name: Board validation
        run: cargo run -p board_validator
      - name: Content lint
        run: cargo run -p content_linter
      - name: Seed browser smoke
        run: cargo run -p seed_browser -- --act 1 --archetype fan --count 3
      - name: Game smoke test
        run: cargo run -p feverfall_game
